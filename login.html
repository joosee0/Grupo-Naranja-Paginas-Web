<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Inmobiliaria</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="theme.css">
    <script src="theme.js"></script>
</head>

<body class="login-page">

    <!-- Header / Menú -->
    <header class="header-prestige">
        <div class="logo">INMOBILIARIA <span>PRESTIGE</span></div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="nosotros.html">Nosotros</a></li>
                <li><a href="propiedades.html">Propiedades</a></li>
                <li><a href="servicios.html">Servicios</a></li>
                <li><a href="login.html" class="active">Login</a></li>
                <li class="dropdown">
                    <a href="contacto.html">Contacto ▾</a>
                    <ul class="dropdown-menu">
                        <li><a href="contacto.html">Contacto General</a></li>
                        <li><a href="gestionamos.html">Gestionamos su Inmueble</a></li>
                        <li><a href="buscamos.html">Díganos qué busca</a></li>
                    </ul>
                </li>
                <li class="theme-toggle-li">
                    <button type="button" class="theme-toggle" onclick="toggleTheme()" aria-label="Cambiar entre modo claro y oscuro">
                        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    </button>
                </li>
            </ul>
        </nav>
    </header>

    <!-- Login -->
    <section class="login">

        <div class="login-box">

            <h1>Inmobiliaria</h1>
            <p>Accede a tu cuenta</p>

            <form onsubmit="return loginUser()">

                <input type="text" id="user" placeholder="Usuario" required>
                <input type="password" id="pass" placeholder="Contraseña" required>

                <button type="submit">Entrar</button>

                <p id="error"></p>

            </form>

        </div>

    </section>

    <script src="login.js"></script>

</body>
</html>
