<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Inmobiliaria</title>

    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">

    <!-- HEADER SIMPLE (SIN USERMENU) -->
    <header>
        <nav>
            <div class="logo">Inmobiliaria Prestige</div>

            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="nosotros.html">Nosotros</a></li>
                <li><a href="propiedades.html">Propiedades</a></li>
                <li><a href="servicios.html">Servicios</a></li>
                <li><a href="contacto.html">Contacto</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>

        </nav>
    </header>

    <!-- LOGIN -->
    <section class="login">

        <div class="login-box">

            <h1>Inmobiliaria Prestige</h1>
            <p id="titulo">Accede a tu cuenta</p>

            <!-- LOGIN FORM -->
            <form id="loginForm" onsubmit="return loginUser()">

                <input type="text" id="user" placeholder="Usuario" required>
                <input type="password" id="pass" placeholder="Contraseña" required>

                <button type="submit">Entrar</button>

            </form>

            <!-- REGISTER FORM -->
            <form id="registerForm" onsubmit="return registerUser()" style="display:none;">

                <input type="text" id="newUser" placeholder="Nuevo usuario" required>
                <input type="password" id="newPass" placeholder="Nueva contraseña" required>

                <button type="submit">Crear cuenta</button>

            </form>

            <p id="error"></p>

            <!-- TOGGLE -->
            <p>
                <a href="#" id="toggleText" onclick="toggleForm()">Crear cuenta</a>
            </p>

        </div>
    </section>

    <script src="login.js"></script>

</body>
</html>
